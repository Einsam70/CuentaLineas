<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de líneas de archivos</title>

  <style>
    :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8fa;
        color: #1f2933;
    }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px;
        border-bottom: 1px solid #d9e2ec;
        background: white;
    }

    h1 {
        margin: 0;
        font-size: 24px;
    }

    a {
        color: #1f5f99;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    main {
        width: min(1180px, calc(100% - 32px));
        margin: 28px auto;
    }

    .panel {
        padding: 22px;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        background: white;
    }

    .panel + .panel {
        margin-top: 18px;
    }

    .formGrid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-bottom: 16px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
    }

    input,
    select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #bcccdc;
        border-radius: 4px;
        font: inherit;
        background: white;
    }

    button {
        padding: 8px 14px;
        border: 1px solid #1f5f99;
        border-radius: 4px;
        background: #1f5f99;
        color: white;
        font: inherit;
        cursor: pointer;
    }

    button:disabled {
        border-color: #bcccdc;
        background: #bcccdc;
        cursor: not-allowed;
    }

</style>

</head>
<body>
  <header>
    <h1>Contador de líneas de archivos</h1>
  </header>

  <main>
    <section class="panel">
        <div class="formGrid">
          <div>
            <input type="file" id="fileInput" accept=".txt, .csv">
          </div>
        </div>
        <div class="formGrid">
          <div>
            <button onclick="countLines()">Contar líneas</button>
          </div>
        </div>
        <div class="formGrid">
          <div>
            <p id="lineCount">Resultado</p>
          </div>
        </div>
    </section>
  </main>

<script>
function countLines() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  
  if (!file) {
    alert('Por favor selecciona un archivo.');
    return;
  }
  
  const reader = new FileReader();
  
  reader.onload = function(event) {
    const contents = event.target.result;
    const lineCount = contents.split(/\r\n|\r|\n/).length;
    document.getElementById('lineCount').textContent = `El archivo tiene ${lineCount} líneas.`;
  };
  
  reader.readAsText(file);
}
</script>
</body>
</html>
